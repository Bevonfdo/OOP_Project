<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f9f0fb; }
        .navbar { background: linear-gradient(135deg, #e91e8c, #9c27b0); }
        .btn-salon {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white; border: none; border-radius: 25px;
        }
        .btn-salon:hover { opacity: 0.9; color: white; }
        h2 { color: #e91e8c; }
        .table { background: white; border-radius: 15px; }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">💅 Beauty Salon Admin</span>
    <a href="/register" class="btn btn-light btn-sm">Add User</a>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">👥 All Users</h2>

    <div th:if="${success}"
         class="alert alert-success" th:text="${success}"></div>

    <table class="table table-hover shadow-sm">
        <thead style="background: linear-gradient(135deg, #e91e8c, #9c27b0); color: white;">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.userId}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.phone}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <a th:href="@{/update/{id}(id=${user.userId})}"
                   class="btn btn-salon btn-sm">Edit</a>
                <a th:href="@{/delete/{id}(id=${user.userId})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this user?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
