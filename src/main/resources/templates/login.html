<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8c8d4, #f3e6f5);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-salon {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 30px;
        }
        .btn-salon:hover { opacity: 0.9; color: white; }
        h2 { color: #e91e8c; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h2 class="text-center mb-4">
                    💅 Welcome Back!
                </h2>

                <div th:if="${error}"
                     class="alert alert-danger" th:text="${error}"></div>

                <form action="/login" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username"
                               class="form-control"
                               placeholder="Enter username" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password"
                               class="form-control"
                               placeholder="Enter password" required/>
                    </div>
                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-salon">Login</button>
                    </div>
                </form>
                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="/register" style="color:#e91e8c;">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
