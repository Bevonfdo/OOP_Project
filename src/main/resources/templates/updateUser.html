<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update User - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8c8d4, #f3e6f5);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-salon {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white; border: none; border-radius: 25px;
            padding: 10px 30px;
        }
        .btn-salon:hover { opacity: 0.9; color: white; }
        h2 { color: #e91e8c; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4">✏️ Update User</h2>

                <div th:if="${error}"
                     class="alert alert-danger" th:text="${error}"></div>

                <form action="/update" method="post">
                    <input type="hidden" name="userId"
                           th:value="${user.userId}"/>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control"
                               th:value="${user.username}" disabled/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email"
                               class="form-control"
                               th:value="${user.email}" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone"
                               class="form-control"
                               th:value="${user.phone}" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="password"
                               class="form-control"
                               placeholder="Enter new password" required/>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit"
                                class="btn btn-salon">Update</button>
                        <a href="/users"
                           class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
