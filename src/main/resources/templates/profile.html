<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8c8d4, #f3e6f5);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .profile-header {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .btn-salon {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white; border: none; border-radius: 25px;
            padding: 10px 30px;
        }
        .btn-salon:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="profile-header mb-4">
                    <h2>💅 My Profile</h2>
                    <p th:text="${user.username}"
                       class="mb-0 fs-4"></p>
                </div>

                <table class="table">
                    <tr>
                        <td><strong>User ID</strong></td>
                        <td th:text="${user.userId}"></td>
                    </tr>
                    <tr>
                        <td><strong>Email</strong></td>
                        <td th:text="${user.email}"></td>
                    </tr>
                    <tr>
                        <td><strong>Phone</strong></td>
                        <td th:text="${user.phone}"></td>
                    </tr>
                    <tr>
                        <td><strong>Role</strong></td>
                        <td th:text="${user.role}"></td>
                    </tr>
                </table>

                <div class="d-grid gap-2">
                    <a th:href="@{/update/{id}(id=${user.userId})}"
                       class="btn btn-salon">Edit Profile</a>
                    <a href="/login"
                       class="btn btn-outline-secondary">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
