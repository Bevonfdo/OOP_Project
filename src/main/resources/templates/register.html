<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Beauty Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8c8d4, #f3e6f5);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-salon {
            background: linear-gradient(135deg, #e91e8c, #9c27b0);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 30px;
        }
        .btn-salon:hover { opacity: 0.9; color: white; }
        h2 { color: #e91e8c; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4">
                    💅 Beauty Salon Registration
                </h2>

                <!-- Success Message -->
                <div th:if="${success}"
                     class="alert alert-success" th:text="${success}"></div>
                <!-- Error Message -->
                <div th:if="${error}"
                     class="alert alert-danger" th:text="${error}"></div>

                <form action="/register" method="post">
                    <div class="mb-3">
                        <label class="form-label">User ID</label>
                        <input type="text" name="userId"
                               class="form-control"
                               placeholder="e.g. U001" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username"
                               class="form-control"
                               placeholder="Enter username" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email"
                               class="form-control"
                               placeholder="Enter email" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password"
                               class="form-control"
                               placeholder="Enter password" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone"
                               class="form-control"
                               placeholder="Enter phone number" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select"
                                id="roleSelect"
                                onchange="toggleRoleFields()">
                            <option value="REGULAR">Regular User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>

                    <!-- Regular User Fields -->
                    <div id="regularFields" class="mb-3">
                        <label class="form-label">Membership Type</label>
                        <select name="membershipType" class="form-select">
                            <option value="SILVER">Silver</option>
                            <option value="GOLD">Gold</option>
                        </select>
                    </div>

                    <!-- Admin Fields -->
                    <div id="adminFields" class="mb-3"
                         style="display:none;">
                        <label class="form-label">Designation</label>
                        <input type="text" name="designation"
                               class="form-control"
                               placeholder="e.g. Manager"/>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-salon">Register</button>
                    </div>
                </form>
                <p class="text-center mt-3">
                    Already have an account?
                    <a href="/login" style="color:#e91e8c;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
    function toggleRoleFields() {
        const role = document.getElementById('roleSelect').value;
        document.getElementById('regularFields').style.display =
            role === 'REGULAR' ? 'block' : 'none';
        document.getElementById('adminFields').style.display =
            role === 'ADMIN' ? 'block' : 'none';
    }
</script>
</body>
</html>
